<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="title" property="og:title" content="2025 Elections | Mapping the Philippines">
  <meta name="type" property="og:type" content="website">
  <meta name="url" property="og:url" content="cjdeclaro.github.io">
  <meta name="image" property="og:image"
    content="https://cjdeclaro.github.io/mapping-the-ph/assets/banners/banner-fb-20250531.png">
  <meta name="description" property="og:description"
    content="Visualizing the 2025 Philippine Elections by mapping the winning candidates at the barangay level across the country.">

  <title>2025 Elections | Mapping the Philippines | cjdeclaro</title>

  <style>
    .legendsColor {
      width: 20px;
      height: 20px;
      border-radius: 20px;
    }

    .glass {
      background-color: rgba(255, 255, 255, 0.5) !important;
      backdrop-filter: blur(1px) brightness(110%) !important;
      color: rgb(0, 0, 0) !important;
      box-shadow: inset 1px 1px 5px 3px rgb(255, 255, 255) !important;
      border: unset !important;
      text-shadow: 0px 0px 2px rgb(255, 255, 255) !important;
    }

    .glass:hover {
      background-color: rgba(255, 255, 255, 0.9) !important;
      box-shadow: inset 0px 0px 5px 10px rgb(255, 255, 255) !important;
    }

    .glass:disabled {
      background-color: rgba(175, 175, 175, 0.5) !important;
      color: grey !important;
      box-shadow: unset !important;
    }
  </style>

  <link rel="icon" href="../assets/img/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body id="body">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <div class="row position-relative">

          <div class="position-absolute w-100 top-0 z-2 py-3">
            <div class="d-flex flex-row justify-content-between align-items-baseline align-items-sm-center">
              <div class="d-flex flex-row flex-start align-items-center">
                <a href="https://cjdeclaro.github.io">
                  <img src="../assets/img/icon.png" style="width: 50px">
                </a>
                <a href="../" class="nav-link ms-3">
                  <div class="h4 mb-0">
                    Mapping the Philippines
                  </div>
                  <div>2025 National Elections</div>
                </a>
              </div>
              <div class="d-flex flex-column flex-sm-row">
                <a class="btn btn-sm m-1 btn-danger rounded-5" target="_blank"
                  href="https://github.com/sponsors/cjdeclaro">
                  <div class="d-flex flex-row flex-start align-items-center">
                    <i class="fa fa-heart"></i>
                    <div class="d-none d-md-block ms-1"><small>GSponsor</small></div>
                  </div>
                </a>
                <a class="btn btn-sm m-1 btn-secondary rounded-5" target="_blank"
                  href="https://buymeacoffee.com/cjdeclaro">
                  <div class="d-flex flex-row flex-start align-items-center">
                    <i class="fa fa-coffee"></i>
                    <div class="d-none d-md-block ms-1"><small>Coffee</small></div>
                  </div>
                </a>
                <a class="btn btn-sm m-1 btn-primary rounded-5" target="_blank"
                  href="https://www.paypal.com/paypalme/cjdeclaro">
                  <div class="d-flex flex-row flex-start align-items-center">
                    <i class="fa fa-paypal"></i>
                    <div class="d-none d-md-block ms-1"><small>PayPal</small></div>
                  </div>
                </a>
              </div>
            </div>
            <div class="d-flex flex-row justify-content-center">
              <div id="loading" class="text-center spinner-grow d-none" role="status">
              </div>
            </div>
          </div>

          <div class="position-absolute top-0 z-1 col-4 col-sm-3 col-lg-2 py-5 overflow-scroll" style="max-height: 100vh;">
            <div class="py-3">
              <div class="my-3 pt-5">
                <label for="filterRegion" class="form-label my-0"><small>Region</small></label>
                <select class="glass rounded-2 form-select form-select-sm" id="filterRegion"
                  onchange="loadProvinceOptions(this.value)">
                  <option selected>ALL</option>
                </select>
              </div>
              <div class="my-3">
                <label for="filterProvince" class="form-labelmy-0"><small>Province</small></label>
                <select class="glass rounded-2 form-select form-select-sm" id="filterProvince"
                  onchange="loadCityOptions(this.value)" disabled>
                  <option selected>ALL</option>
                </select>
              </div>
              <div class="my-3">
                <label for="filterCity" class="form-label my-0"><small>City/Mun</small></label>
                <select class="glass rounded-2 form-select form-select-sm" id="filterCity" disabled>
                  <option selected>ALL</option>
                </select>
              </div>
              <div class="my-3">
                <label for="filterResult" class="form-label my-0"><small>Result</small></label>
                <select class="glass rounded-2 form-select form-select-sm" onchange="resultChange(this.value)"
                  id="filterResult">
                  <option selected value="senatorBrgyVotes">Top 1 Senator</option>
                  <option value="partylistBrgyVotes">Top 1 Partylist</option>
                  <option value="averageVoterTurnOut">Voter Turnout</option>
                  <option value="perSenator">Per Senator</option>
                  <option value="compareSenator">Compare Senators</option>
                </select>
              </div>
              <div class="my-3 d-none" id="senatorListFilterContainer">
                <label for="senatorListFilter" class="form-label my-0"><small>Senator</small></label>
                <select class="glass rounded-2 form-select form-select-sm" id="senatorListFilter">
                </select>
              </div>
              <div class="my-3 d-none" id="senatorListFilterContainer2">
                <label for="senatorListFilter2" class="form-label my-0"><small>Senator</small></label>
                <select class="glass rounded-2 form-select form-select-sm" id="senatorListFilter2">
                </select>
              </div>
              <div class="my-3" id="resultCountFilterContainer">
                <label for="senatorListFilter" class="form-label my-0"><small>Result Count</small></label>
                <input type="number" min="1" max="12" value="12" class="form-control" id="resultCountFilter" onchange="checkResultCountFilter()">
              </div>
              <div class="my-4" id="render-btn">
                <button type="button" onclick="loadBarangayData()" class="glass btn rounded-5 px-3 py-2">
                  Render<span class="d-none d-sm-inline"> Map</span>
                </button>
              </div>
            </div>
          </div>

          <div class="position-absolute bottom-0 w-100 z-1 py-2">
            <div class="d-flex flex-row justify-content-end">
              <div class="col-8 col-sm-9 col-lg-10">
                <div class="" style="overflow-x: auto;">
                  <div class="d-flex flex-row" style="width: fit-content" id="legends">
                  </div>
                </div>
                <div class="d-flex flex-row align-items-end justify-content-between">
                  <div class="">
                    <small class="text-secondary d-none d-lg-block">
                      Data gathered from the Comelec transparency server through the Comelec website. Data accuracy is
                      not
                      certain. Wider scope will require more computing resources.
                    </small>
                  </div>
                  <div class="ms-3">
                    <a target="_blank" href="https://github.com/cjdeclaro/mapping-the-ph"
                      class="btn btn-sm btn-secondary">
                      <div class="d-flex flex-row flex-start align-items-center">
                        <i class="fa fa-github"></i>
                        <div class="ms-1">
                          <small>Documentation</small>
                        </div>
                      </div>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div id="map" style="height: 100vh;" class="z-0"></div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/colors.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/filter.js"></script>
  <script src="js/mapping.js"></script>
  <script src="js/cachedloader.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      loadRegionOptions();
      loadSenatorOptions();
      renderBaseMap();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous">
  </script>
</body>

</html>
